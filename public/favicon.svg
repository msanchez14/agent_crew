<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Leader → Worker connections -->
  <line x1="27" y1="30" x2="18" y2="19" stroke="white" stroke-width="1.3" opacity="0.5" stroke-linecap="round"/>
  <line x1="27" y1="30" x2="45" y2="20" stroke="white" stroke-width="1.3" opacity="0.5" stroke-linecap="round"/>
  <line x1="27" y1="30" x2="16" y2="47" stroke="white" stroke-width="1.3" opacity="0.5" stroke-linecap="round"/>
  <line x1="27" y1="30" x2="44" y2="49" stroke="white" stroke-width="1.3" opacity="0.5" stroke-linecap="round"/>
  <!-- Worker cross-links -->
  <line x1="18" y1="19" x2="45" y2="20" stroke="white" stroke-width="0.6" opacity="0.15" stroke-linecap="round"/>
  <line x1="16" y1="47" x2="44" y2="49" stroke="white" stroke-width="0.6" opacity="0.15" stroke-linecap="round"/>
  <line x1="45" y1="20" x2="44" y2="49" stroke="white" stroke-width="0.6" opacity="0.15" stroke-linecap="round"/>
  <!-- Leader glow -->
  <circle cx="27" cy="30" r="9.5" fill="white" opacity="0.12"/>
  <!-- Leader node -->
  <circle cx="27" cy="30" r="7" fill="white" opacity="0.95"/>
  <!-- Worker nodes -->
  <circle cx="18" cy="19" r="4.2" fill="white" opacity="0.85"/>
  <circle cx="45" cy="20" r="4.8" fill="white" opacity="0.9"/>
  <circle cx="16" cy="47" r="3.8" fill="white" opacity="0.8"/>
  <circle cx="44" cy="49" r="4.5" fill="white" opacity="0.85"/>
  <!-- Satellite dots -->
  <circle cx="10" cy="35" r="1.3" fill="white" opacity="0.25"/>
  <circle cx="52" cy="36" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="30" cy="56" r="1.1" fill="white" opacity="0.15"/>
</svg>
